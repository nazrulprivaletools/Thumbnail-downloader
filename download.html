<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result | Nazrul Private Tools</title>

    <meta name="robots" content="noindex, nofollow" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Outfit', 'Hind Siliguri', sans-serif; background: #0f172a; color: #f8fafc; }
       .data-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 25px; border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px; position: relative; }
       .stat-box { text-align: center; padding: 20px; border-radius: 1.5rem; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(239, 68, 68, 0.2); transition: transform 0.3s ease; }
       .stat-box:hover { transform: translateY(-5px); border-color: #ef4444; }
       .copy-btn { position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; padding: 6px 15px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; z-index: 10; }
       .copy-btn:hover { background: #b91c1c; transform: scale(1.05); }
        #mainImg { transition: all 0.5s ease; border-radius: 1.5rem; }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <div id="loader" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-red-600 mb-4"></div>
            <p class="text-slate-500 font-bold tracking-widest uppercase text-xs">Analyzing Link Data...</p>
        </div>

        <div id="mainContent" class="hidden">
            <div id="mediaBox" class="data-card text-center">
                <div class="relative inline-block mb-8">
                    <img id="mainImg" class="w-48 h-48 mx-auto shadow-2xl border-4 border-slate-700 object-cover" src="" alt="Media">
                </div>
                <br>
                <button id="dlBtn" onclick="forceDownloadMedia()" class="bg-red-600 hover:bg-red-700 text-white font-black px-10 py-4 rounded-2xl mb-8 shadow-xl w-full sm:w-auto transition-all active:scale-95 uppercase tracking-wider">Download HD Media</button>

                <div class="text-left relative bg-slate-900/50 p-6 rounded-3xl border border-slate-700">
                    <button onclick="copyTextFromElement('vTitle')" class="copy-btn">COPY</button>
                    <h2 id="titleLabel" class="text-red-500 font-black text-xs uppercase tracking-widest mb-2">Name / Title:</h2>
                    <p id="vTitle" class="text-white font-bold text-xl pr-16 leading-tight"></p>

                    <div id="videoMeta" class="flex flex-wrap gap-6 mt-6 pt-6 border-t border-slate-800">
                        <div class="text-sm font-bold text-slate-400">VIEWS: <span id="vViews" class="text-red-500">0</span></div>
                        <div id="likeSection" class="text-sm font-bold text-slate-400">LIKES: <span id="vLikes" class="text-red-500">0</span></div>
                    </div>
                </div>
            </div>

            <div id="channelStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-box">
                    <span class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Subscribers</span>
                    <div id="cSubs" class="text-xl font-black text-white">0</div>
                </div>
                <div class="stat-box">
                    <span class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Total Views</span>
                    <div id="cViews" class="text-xl font-black text-white">0</div>
                </div>
                <div class="stat-box">
                    <span class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Videos</span>
                    <div id="cVids" class="text-xl font-black text-white">0</div>
                </div>
                <div class="stat-box">
                    <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Est. Income</span>
                    <div id="cIncome" class="text-xl font-black text-green-500">$0 - $0</div>
                </div>
            </div>

            <div id="tagCard" class="data-card">
                <button onclick="copyTextFromElement('vTags')" class="copy-btn">COPY</button>
                <h3 class="font-black text-xs text-red-500 uppercase tracking-widest mb-4">Video Tags & Keywords:</h3>
                <div id="vTags" class="text-sm text-slate-300 bg-slate-900/50 p-6 rounded-2xl italic pr-16 min-h-[60px]"></div>
            </div>

            <div class="data-card">
                <button onclick="copyTextFromElement('cKeywords')" class="copy-btn">COPY</button>
                <h3 class="font-black text-xs text-blue-400 uppercase tracking-widest mb-4">Channel Keywords:</h3>
                <div id="cKeywords" class="text-sm text-slate-300 bg-slate-900/50 p-6 rounded-2xl italic pr-16 min-h-[60px]"></div>
            </div>

            <div class="data-card">
                <button onclick="copyTextFromElement('vDesc')" class="copy-btn">COPY</button>
                <h3 id="descLabel" class="font-black text-xs text-red-500 uppercase tracking-widest mb-4">Description / Bio:</h3>
                <textarea id="vDesc" readonly class="w-full h-56 bg-slate-900/50 p-6 text-sm text-slate-300 rounded-2xl outline-none border-none resize-none leading-relaxed"></textarea>
            </div>

            <div class="text-center mt-20 space-y-2">
                <p class="text-red-500 font-bold uppercase tracking-widest text-sm">CEO: NAZRUL ISLAM</p>
                <p class="text-slate-400 font-medium text-sm">WhatsApp: 01316487435</p>
                <a href="index.html" class="block pt-8 text-slate-500 hover:text-red-500 font-black uppercase text-xs tracking-widest transition-all">
                    ← Perform Another Search
                </a>
            </div>
        </div>
    </div>

    <textarea id="tempInput" style="position: absolute; left: -9999px;"></textarea>

    <script>
        const API_KEY = 'AIzaSyBvSbU2JjdRttm9-u1DxCmL3-BD_Wlo46E';
        let mediaUrl = "";
        let finalFileName = "download.jpg";

        window.onload = async function() {
            const targetUrl = localStorage.getItem('ytTargetUrl');
            if(!targetUrl) { window.location.href = 'index.html'; return; }

            try {
                if (targetUrl.includes('watch?v=') || targetUrl.includes('youtu.be/') || targetUrl.includes('shorts/')) {
                    await loadVideoData(targetUrl);
                } else {
                    await loadChannelData(targetUrl);
                }
            } catch (error) {
                alert("Invalid Link. Please try again.");
                window.location.href = 'index.html';
            }
        };

        async function loadVideoData(url) {
            let vId = "";
            if (url.includes('v=')) vId = url.split('v=')[1].split('&')[0];
            else if (url.includes('shorts/')) vId = url.split('shorts/')[1].split('?')[0];
            else vId = url.split('/').pop().split('?')[0];

            const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${vId}&key=${API_KEY}`);
            const data = await response.json();
            const video = data.items[0];

            const mainImg = document.getElementById('mainImg');
            mainImg.classList.add('rounded-[2rem]', 'w-full', 'h-auto');

            mediaUrl = `https://i.ytimg.com/vi/${vId}/maxresdefault.jpg`;
            mainImg.src = mediaUrl;
            mainImg.onerror = function() {
                this.src = `https://i.ytimg.com/vi/${vId}/hqdefault.jpg`;
                mediaUrl = `https://i.ytimg.com/vi/${vId}/hqdefault.jpg`;
            };
            finalFileName = `thumb-${vId}.jpg`;

            document.getElementById('vTitle').innerText = video.snippet.title;
            document.getElementById('vTags').innerText = video.snippet.tags? video.snippet.tags.join(', ') : 'No Tags Found';
            document.getElementById('vDesc').value = video.snippet.description;
            document.getElementById('vViews').innerText = Number(video.statistics.viewCount).toLocaleString();
            document.getElementById('vLikes').innerText = video.statistics.likeCount? Number(video.statistics.likeCount).toLocaleString() : "N/A";

            await loadStats(video.snippet.channelId);
            finishLoading();
        }

        async function loadChannelData(url) {
            let queryPath = "";
            if (url.includes('/@')) {
                const handle = url.split('/@')[1].split('/')[0].split('?')[0];
                queryPath = `forHandle=${handle}`;
            } else if (url.includes('/channel/')) {
                const id = url.split('/channel/')[1].split('/')[0].split('?')[0];
                queryPath = `id=${id}`;
            }

            const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&${queryPath}&key=${API_KEY}`);
            const data = await response.json();
            const channel = data.items[0];

            mediaUrl = channel.snippet.thumbnails.high?.url || channel.snippet.thumbnails.medium?.url || channel.snippet.thumbnails.default.url;
            document.getElementById('mainImg').src = mediaUrl;
            document.getElementById('mainImg').classList.add('rounded-full');
            finalFileName = `channel-logo-${channel.id}.jpg`;

            document.getElementById('titleLabel').innerText = "CHANNEL NAME:";
            document.getElementById('vTitle').innerText = channel.snippet.title;
            document.getElementById('descLabel').innerText = "CHANNEL BIO:";
            document.getElementById('vDesc').value = channel.snippet.description;

            document.getElementById('tagCard').style.display = 'none';
            document.getElementById('likeSection').style.display = 'none';

            updateStatsUI(channel);
            finishLoading();
        }

        async function loadStats(cId) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${cId}&key=${API_KEY}`);
            const data = await res.json();
            updateStatsUI(data.items[0]);
        }

        function updateStatsUI(chan) {
            document.getElementById('cSubs').innerText = Number(chan.statistics.subscriberCount).toLocaleString();
            document.getElementById('cViews').innerText = Number(chan.statistics.viewCount).toLocaleString();
            document.getElementById('cVids').innerText = chan.statistics.videoCount;

            const keywords = chan.brandingSettings?.channel?.keywords;
            document.getElementById('cKeywords').innerText = keywords? keywords : 'No Channel Keywords';

            const totalV = Number(chan.statistics.viewCount);
            const vCount = Number(chan.statistics.videoCount) || 1;
            const monthlyEst = (totalV / vCount) * 2;
            const min = (monthlyEst / 1000) * 0.25;
            const max = (monthlyEst / 1000) * 3.50;
            document.getElementById('cIncome').innerText = `$${Math.floor(min)} - $${Math.floor(max)}`;
        }

        function forceDownloadMedia() {
            const btn = document.getElementById('dlBtn');
            btn.innerText = "OPENING...";
            window.open(mediaUrl, '_blank');
            setTimeout(() => {
                btn.innerText = "DOWNLOAD HD MEDIA";
            }, 1500);
        }

        function finishLoading() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function copyTextFromElement(id) {
            const el = document.getElementById(id);
            const temp = document.getElementById('tempInput');
            temp.value = (el.tagName === 'TEXTAREA')? el.value : el.innerText;
            temp.select();
            document.execCommand('copy');
            alert("Data Copied!");
        }
    </script>
</body>
</html>

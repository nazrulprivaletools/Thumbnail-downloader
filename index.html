<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube SEO Pro | Private Tool</title>
    
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Private YouTube SEO Analysis Tool.">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
        }

        .premium-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .red-gradient-btn {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .red-gradient-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.5);
        }

        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(239, 68, 68, 0.2);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-12 px-4">

    <div class="max-w-3xl w-full premium-card rounded-[3rem] p-8 md:p-16 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-red-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>

        <header class="text-center mb-12 relative">
            <div class="inline-block p-4 bg-red-600/10 rounded-3xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 glow-text uppercase tracking-tighter">YouTube SEO <span class="text-red-600">Pro</span></h1>
            <p class="text-slate-400 text-lg font-medium">Private Metadata & Analytics Extractor</p>
        </header>

        <div class="space-y-6 relative">
            <div class="space-y-2">
                <label class="block text-slate-300 font-bold ml-2 uppercase text-sm tracking-widest">Video or Channel URL</label>
                <input type="text" id="ytInput" placeholder="Paste link here..." 
                class="input-glass w-full p-6 rounded-3xl text-white text-lg outline-none placeholder:text-slate-600">
            </div>
            
            <button onclick="processData()" class="red-gradient-btn w-full text-white font-black py-6 rounded-3xl text-2xl shadow-2xl flex items-center justify-center gap-3 group">
                START ANALYSIS
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>
        </div>

        <div class="mt-12 text-center space-y-2 pt-10 border-t border-slate-700/50">
            <p class="text-red-500 font-bold uppercase tracking-widest text-sm">CEO: NAZRUL ISLAM</p>
            <p class="text-slate-400 font-medium text-sm">WhatsApp: 01316487435</p>
        </div>

        <footer class="mt-10 text-center opacity-30">
            <p class="text-slate-500 text-xs uppercase tracking-[0.3em] font-bold">© 2026 Nazrul Private Tools</p>
        </footer>
    </div>

    <script>
        function processData() {
            const url = document.getElementById('ytInput').value.trim();
            if(!url) { 
                alert("Please enter a valid YouTube URL!"); 
                return; 
            }
            const btn = document.querySelector('button');
            btn.innerHTML = 'Analyzing...';
            btn.classList.add('opacity-70');
            
            localStorage.setItem('ytTargetUrl', url);
            setTimeout(() => {
                window.location.href = 'download.html';
            }, 800);
        }
    </script>
</body>
</html>
